name: Release CI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    outputs:
      tag-name: ${{ steps.get-tag.outputs.tag-name }}

    steps:
      - uses: actions/checkout@v4

      - name: Get tag name
        id: get-tag
        run: echo "tag-name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 9862592

      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.KEYSTORE }}
          SIGNING_KEY_STORE_PATH: keystore.jks
        run: |
          echo $ENCODED_STRING > keystore-b64.txt
          base64 -d keystore-b64.txt > $SIGNING_KEY_STORE_PATH

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew :app:assembleRelease
        env:
          SIGNING_KEY_STORE_PATH: keystore.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: app/build/outputs/apk/release/app-*-release.apk

  create-release:
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: apk-release
          path: ./apk

      - name: Rename APKs
        run: |
          cd ./apk
          mv app-arm64-v8a-release.apk  AiModelHub-${{ needs.build.outputs.tag-name }}-arm64-v8a.apk
          mv app-x86_64-release.apk     AiModelHub-${{ needs.build.outputs.tag-name }}-x86_64.apk

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ needs.build.outputs.tag-name }} \
            ./apk/AiModelHub-${{ needs.build.outputs.tag-name }}-arm64-v8a.apk \
            ./apk/AiModelHub-${{ needs.build.outputs.tag-name }}-x86_64.apk \
            --repo ${{ github.repository }} \
            --title "${{ needs.build.outputs.tag-name }}" \
            --generate-notes
