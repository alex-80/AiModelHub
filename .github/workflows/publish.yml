name: Publish SDK to JitPack

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build SDK release
        run: ./gradlew :sdk:assembleRelease

      - name: Pre-trigger JitPack build
        run: |
          TAG=${GITHUB_REF_NAME}
          echo "Triggering JitPack build for tag: $TAG"
          curl -s "https://jitpack.io/api/builds/com.github.alex-80/AiModelHub/$TAG" \
            -X GET \
            -o /dev/null \
            -w "JitPack response: %{http_code}\n" || true
