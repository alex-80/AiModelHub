name: Publish SDK to GitHub Packages

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Publish SDK to GitHub Packages
        run: ./gradlew :sdk:publishReleasePublicationToGitHubPackagesRepository -PVERSION_NAME=${GITHUB_REF_NAME#v}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
